<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT CV Builder</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f1117;
color:#e6e6e6;
margin:0;
padding:20px;
}

.container{
display:flex;
gap:30px;
}

.editor{
width:40%;
background:#1b1e27;
padding:20px;
border-radius:10px;
}

.editor input, .editor textarea{
width:100%;
margin-bottom:10px;
padding:8px;
border-radius:5px;
border:none;
}

.preview{
width:60%;
background:white;
color:black;
padding:30px;
border-radius:10px;
}

h2{
margin-top:20px;
}

.skill{
display:inline-block;
background:#eee;
padding:5px 10px;
margin:4px;
border-radius:15px;
font-size:12px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

@media print{
body{background:white}
.editor{display:none}
.preview{width:100%}
}
</style>
</head>

<body>

<div class="container">

<div class="editor">

<h2>Personal</h2>
<input id="name" value="ლუკა კანდელაკი">
<input id="title" value="IT მხარდაჭერის სპეციალისტი">
<input id="phone" value="+995 551 198 974">
<input id="email" value="lukakandelaki12@gmail.com">
<input id="location" value="Tbilisi, Georgia">

<h2>Profile</h2>
<textarea id="profile">IT მხარდაჭერის სპეციალისტი პრაქტიკული გამოცდილებით ლეპტოპებისა და დესკტოპების დიაგნოსტიკასა და გამართვაში. გამოცდილი Windows 10/11 ინსტალაციაში, სისტემის ოპტიმიზაციაში და მომხმარებლის ტექნიკურ მხარდაჭერაში. მაქვს გამოცდილება ქსელური პრობლემების დიაგნოსტიკაში (TCP/IP, DNS), Wi-Fi კონფიგურაციაში და VPN მომხმარებლების მხარდაჭერაში.</textarea>

<h2>Skills</h2>
<textarea id="skills">
Windows 10/11 Install & Troubleshoot
Laptop Refurbishing (SSD/RAM)
Drivers & Updates
Performance Optimization (Debloat)
Wi-Fi Troubleshooting
Basic Networking (TCP/IP, DNS, DHCP)
VPN Account Setup & Connectivity Support
Network Diagnostics (ipconfig, ping, tracert, nslookup)
Software Setup (Office / Utilities)
Hardware Diagnostics
</textarea>

<h2>Experience</h2>
<textarea id="experience">
IT მხარდაჭერა / ტექნიკოსი (Freelance / პირადი პროექტები) | 20XX – დღემდე

• ლეპტოპ/დესკტოპ HW და OS პრობლემების დიაგნოსტიკა და აღმოფხვრა
• Windows 10/11 სუფთა ინსტალაცია, დრაივერები და სისტემის სტაბილურობის ტესტი
• SSD/RAM განახლება და მოწყობილობის სტაბილურობის შემოწმება
• სისტემის ოპტიმიზაცია: ბლოუთვერის ამოშლა და Startup ტიუნინგი
• Wi-Fi და LAN პრობლემების დიაგნოსტიკა
• TCP/IP კონფიგურაციის შემოწმება და ქსელის პრობლემების აღმოჩენა
• VPN ანგარიშების შექმნა და მომხმარებლების დაკავშირების დახმარება
• საოფისე პროგრამების ინსტალაცია და გამართვა
</textarea>

<h2>Education</h2>
<textarea id="education">
თვითნასწავლი IT სპეციალისტი | პრაქტიკული გამოცდილება და დამოუკიდებელი პროექტები
</textarea>

<h2>Languages</h2>
<textarea id="languages">
ქართული — მშობლიური
ინგლისური — C1
</textarea>

<button onclick="updateCV()">Update Preview</button>
<button onclick="window.print()">Print / Save PDF</button>

</div>

<div class="preview" id="preview">

<h1 id="pname"></h1>
<p id="ptitle"></p>
<p id="pcontact"></p>

<h2>PROFILE</h2>
<p id="pprofile"></p>

<h2>SKILLS</h2>
<div id="pskills"></div>

<h2>EXPERIENCE</h2>
<pre id="pexperience"></pre>

<h2>EDUCATION</h2>
<p id="peducation"></p>

<h2>LANGUAGES</h2>
<p id="planguages"></p>

</div>

</div>

<script>

function updateCV(){

document.getElementById("pname").innerText=document.getElementById("name").value
document.getElementById("ptitle").innerText=document.getElementById("title").value
document.getElementById("pcontact").innerText=
document.getElementById("phone").value+" | "+
document.getElementById("email").value+" | "+
document.getElementById("location").value

document.getElementById("pprofile").innerText=document.getElementById("profile").value

let skills=document.getElementById("skills").value.split("\n")
let skillHTML=""

skills.forEach(s=>{
if(s.trim()!=""){
skillHTML+=`<span class="skill">${s}</span>`
}
})

document.getElementById("pskills").innerHTML=skillHTML

document.getElementById("pexperience").innerText=document.getElementById("experience").value
document.getElementById("peducation").innerText=document.getElementById("education").value
document.getElementById("planguages").innerText=document.getElementById("languages").value

}

updateCV()

</script>

</body>
</html>
